<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark navy background -->
  <rect width="64" height="64" rx="8" fill="#1B2A4A"/>
  <!-- Roof / triangle (gold) -->
  <polygon points="32,8 52,28 12,28" fill="#C9A96E"/>
  <!-- House body (navy, slightly lighter) -->
  <rect x="18" y="28" width="28" height="22" fill="#1B2A4A"/>
  <!-- Window grid (gold) - 2x2 -->
  <rect x="26" y="33" width="5" height="5" fill="#C9A96E"/>
  <rect x="33" y="33" width="5" height="5" fill="#C9A96E"/>
  <rect x="26" y="40" width="5" height="5" fill="#C9A96E"/>
  <rect x="33" y="40" width="5" height="5" fill="#C9A96E"/>
  <!-- Vertical divider -->
  <rect x="31" y="33" width="2" height="12" fill="#1B2A4A"/>
  <!-- Horizontal divider -->
  <rect x="26" y="39" width="12" height="2" fill="#1B2A4A"/>
</svg>
