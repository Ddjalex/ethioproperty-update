    (function() {
      /* Hide subcity card description text, keep icon + name */
      function hideSubcityDescriptions() {
        var headings = document.querySelectorAll('h2, h3');
        for (var i = 0; i < headings.length; i++) {
          if (/Explore Addis Ababa Subcit/i.test(headings[i].textContent)) {
            var heading = headings[i];
            /* Walk up to the section wrapper */
            var section = heading.closest('section') || heading.parentElement;
            while (section && section !== document.body) {
              /* The subtitle sits directly inside the section, not inside a card.
                 Cards are deeper descendants — find p tags that are NOT direct
                 children of the section or its immediate wrapper. */
              var allP = section.querySelectorAll('p');
              var found = false;
              allP.forEach(function(p) {
                /* Skip the section subtitle (direct grandchild of section) */
                if (p.parentElement === section || p.parentElement === heading.parentElement) return;
                var txt = p.textContent.trim();
                if (txt.length > 15) {
                  p.style.display = 'none';
                  found = true;
                }
              });
              if (found) break;
              section = section.parentElement;
            }
            break;
          }
        }
      }
      hideSubcityDescriptions();
      var obs2 = new MutationObserver(function() { hideSubcityDescriptions(); });
      obs2.observe(document.body, { childList: true, subtree: true });
    })();
    </script>

    <script>
    (function () {
      // Fix: embedded video iframe can overlap the tab bar on mobile, blocking clicks on Description/Features/Location.
      // This patch raises the tab bar z-index and (only during a tab touch) briefly disables iframe pointer-events.
      const style = document.createElement('style');
      style.textContent = `
        [role="tablist"], .tabs, .tablist, .property-tabs, .property-detail-tabs {
          position: relative !important;
          z-index: 9999 !important;
          pointer-events: auto !important;
        }
        /* keep video container below the tabs */
        .video-embed, .property-video, .video-panel, .video-tab {
          position: relative !important;
          z-index: 1 !important;
          overflow: hidden !important;
        }
        iframe { max-width: 100% !important; }
      `;
      document.head.appendChild(style);

      function boostTabBar() {
        const nodes = Array.from(document.querySelectorAll('[role="tablist"], .tabs, .tablist, .property-tabs, .property-detail-tabs'));
        for (const el of nodes) {
          const t = (el.innerText || '').trim();
          if (t && /Description/i.test(t) && /Features/i.test(t) && /Location/i.test(t)) {
            el.style.position = 'relative';
            el.style.zIndex = '9999';
            // Ensure it's clickable even if something overlaps
            el.style.pointerEvents = 'auto';
            // Add background so text remains readable if it becomes sticky in some layouts
            if (!el.style.background) el.style.background = 'white';
          }
        }
      }

      boostTabBar();
      new MutationObserver(boostTabBar).observe(document.body, { childList: true, subtree: true });

      // On mobile, if the iframe is slightly overlapping, taps may go to the iframe.
      // When the user touches the tab bar area, temporarily disable iframe pointer-events so the tab click works.
      document.addEventListener('touchstart', function (e) {
        const tabArea = e.target && e.target.closest && e.target.closest('[role="tablist"], .tabs, .tablist, .property-tabs, .property-detail-tabs');
        if (!tabArea) return;

        const iframes = document.querySelectorAll('iframe');
        iframes.forEach(f => {
          f.dataset.__prevPointerEvents = f.style.pointerEvents || '';
          f.style.pointerEvents = 'none';
        });

        window.setTimeout(() => {
          document.querySelectorAll('iframe').forEach(f => {
            f.style.pointerEvents = f.dataset.__prevPointerEvents || '';
            delete f.dataset.__prevPointerEvents;
          });
        }, 450);
      }, { capture: true, passive: true });
    })();
    </script>

                  node.style.setProperty('max-width', '480px', 'important');
                }
                break;
              }
              node = node.parentElement;
            }
          }
        }
      }

      [0, 200, 600, 1200].forEach(function(ms) { setTimeout(applyBodyFixes, ms); });

      var lastPath = location.pathname;
      setInterval(function() {
        if (location.pathname !== lastPath) {
          lastPath = location.pathname;
          [0, 200, 600].forEach(function(ms) { setTimeout(applyBodyFixes, ms); });

    <script>
    (function() {
      /* Hide subcity card description text, keep icon + name */
      function hideSubcityDescriptions() {
        var headings = document.querySelectorAll('h2, h3');
        for (var i = 0; i < headings.length; i++) {
          if (/Explore Addis Ababa Subcit/i.test(headings[i].textContent)) {
            var heading = headings[i];
            /* Walk up to the section wrapper */
            var section = heading.closest('section') || heading.parentElement;
            while (section && section !== document.body) {
              /* The subtitle sits directly inside the section, not inside a card.
                 Cards are deeper descendants — find p tags that are NOT direct
                 children of the section or its immediate wrapper. */
              var allP = section.querySelectorAll('p');
              var found = false;
              allP.forEach(function(p) {
                /* Skip the section subtitle (direct grandchild of section) */
                if (p.parentElement === section || p.parentElement === heading.parentElement) return;
                var txt = p.textContent.trim();
                if (txt.length > 15) {
                  p.style.display = 'none';
                  found = true;
                }
              });
              if (found) break;
              section = section.parentElement;
            }
            break;
          }
        }
      }
      hideSubcityDescriptions();
      var obs2 = new MutationObserver(function() { hideSubcityDescriptions(); });
      obs2.observe(document.body, { childList: true, subtree: true });
    })();

    <script>
    (function () {
      // Fix: embedded video iframe can overlap the tab bar on mobile, blocking clicks on Description/Features/Location.
      // This patch raises the tab bar z-index and (only during a tab touch) briefly disables iframe pointer-events.
      const style = document.createElement('style');
      style.textContent = `
        [role="tablist"], .tabs, .tablist, .property-tabs, .property-detail-tabs {
          position: relative !important;
          z-index: 9999 !important;
          pointer-events: auto !important;
        }
        /* keep video container below the tabs */
        .video-embed, .property-video, .video-panel, .video-tab {
          position: relative !important;
          z-index: 1 !important;
          overflow: hidden !important;
        }
        iframe { max-width: 100% !important; }
      `;
      document.head.appendChild(style);

      function boostTabBar() {
        const nodes = Array.from(document.querySelectorAll('[role="tablist"], .tabs, .tablist, .property-tabs, .property-detail-tabs'));
        for (const el of nodes) {
          const t = (el.innerText || '').trim();
          if (t && /Description/i.test(t) && /Features/i.test(t) && /Location/i.test(t)) {
            el.style.position = 'relative';
            el.style.zIndex = '9999';
            // Ensure it's clickable even if something overlaps
            el.style.pointerEvents = 'auto';
            // Add background so text remains readable if it becomes sticky in some layouts
            if (!el.style.background) el.style.background = 'white';
          }
        }
      }

      boostTabBar();
      new MutationObserver(boostTabBar).observe(document.body, { childList: true, subtree: true });

      // On mobile, if the iframe is slightly overlapping, taps may go to the iframe.
      // When the user touches the tab bar area, temporarily disable iframe pointer-events so the tab click works.
      document.addEventListener('touchstart', function (e) {
        const tabArea = e.target && e.target.closest && e.target.closest('[role="tablist"], .tabs, .tablist, .property-tabs, .property-detail-tabs');
        if (!tabArea) return;

        const iframes = document.querySelectorAll('iframe');
        iframes.forEach(f => {
          f.dataset.__prevPointerEvents = f.style.pointerEvents || '';
          f.style.pointerEvents = 'none';
        });

        window.setTimeout(() => {
          document.querySelectorAll('iframe').forEach(f => {
            f.style.pointerEvents = f.dataset.__prevPointerEvents || '';
            delete f.dataset.__prevPointerEvents;
          });
        }, 450);
      }, { capture: true, passive: true });
    })();
    </script>

    (function() {
      function isAuthPage() {
        var p = window.location.pathname;
        return p === '/auth' || p === '/login' || p === '/register';
      }

      function applyBodyFixes() {
        var auth = isAuthPage();

        /* Hide footer on auth pages */
        document.querySelectorAll('footer, [class*="footer"]').forEach(function(el) {
          el.style.setProperty('display', auth ? 'none' : '', 'important');
        });

        /* Desktop only: hide the empty left decorative panel & center the form */
        if (auth && window.innerWidth >= 768) {
          var pwInput = document.querySelector('input[type="password"]');
          if (pwInput) {
            var node = pwInput.parentElement;
            while (node && node !== document.body) {
              var parent = node.parentElement;
              if (!parent) break;
              var pcs = window.getComputedStyle(parent);
              var kids = Array.from(parent.children);
              if (pcs.display === 'flex' && pcs.flexDirection !== 'column' && kids.length === 2) {
                var sibling = kids[0] === node ? kids[1] : kids[0];
                if (!sibling.querySelector('input')) {
                  sibling.style.setProperty('display', 'none', 'important');
                  parent.style.setProperty('justify-content', 'center', 'important');
                  node.style.setProperty('width', '100%', 'important');
                  node.style.setProperty('max-width', '480px', 'important');
                }
                break;
              }
              node = node.parentElement;
            }
          }
        }
      }

      [0, 200, 600, 1200].forEach(function(ms) { setTimeout(applyBodyFixes, ms); });
      window.addEventListener('resize', applyBodyFixes);
      var lastPath = location.pathname;
      setInterval(function() {
        if (location.pathname !== lastPath) {
          lastPath = location.pathname;
          [0, 200, 600].forEach(function(ms) { setTimeout(applyBodyFixes, ms); });
        }
      }, 300);
    })();
    </script>
