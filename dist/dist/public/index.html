    (function () {
      // Fix: embedded video iframe can overlap the tab bar on mobile, blocking clicks on Description/Features/Location.
      // This patch raises the tab bar z-index and (only during a tab touch) briefly disables iframe pointer-events.
      const style = document.createElement('style');
      style.textContent = `
        [role="tablist"], .tabs, .tablist, .property-tabs, .property-detail-tabs {
          position: relative !important;
          z-index: 9999 !important;
          pointer-events: auto !important;
        }
        /* keep video container below the tabs */
        .video-embed, .property-video, .video-panel, .video-tab {
          position: relative !important;
          z-index: 1 !important;
          overflow: hidden !important;
        }
        iframe { max-width: 100% !important; }
      `;
      document.head.appendChild(style);

      function boostTabBar() {
        const nodes = Array.from(document.querySelectorAll('[role="tablist"], .tabs, .tablist, .property-tabs, .property-detail-tabs'));
        for (const el of nodes) {
          const t = (el.innerText || '').trim();
          if (t && /Description/i.test(t) && /Features/i.test(t) && /Location/i.test(t)) {
            el.style.position = 'relative';
            el.style.zIndex = '9999';
            // Ensure it's clickable even if something overlaps
            el.style.pointerEvents = 'auto';
            // Add background so text remains readable if it becomes sticky in some layouts
            if (!el.style.background) el.style.background = 'white';
          }
        }
      }

      boostTabBar();
      new MutationObserver(boostTabBar).observe(document.body, { childList: true, subtree: true });

      // On mobile, if the iframe is slightly overlapping, taps may go to the iframe.
      // When the user touches the tab bar area, temporarily disable iframe pointer-events so the tab click works.
      document.addEventListener('touchstart', function (e) {
        const tabArea = e.target && e.target.closest && e.target.closest('[role="tablist"], .tabs, .tablist, .property-tabs, .property-detail-tabs');
        if (!tabArea) return;

        const iframes = document.querySelectorAll('iframe');
        iframes.forEach(f => {
          f.dataset.__prevPointerEvents = f.style.pointerEvents || '';
          f.style.pointerEvents = 'none';
        });

        window.setTimeout(() => {
          document.querySelectorAll('iframe').forEach(f => {
            f.style.pointerEvents = f.dataset.__prevPointerEvents || '';
            delete f.dataset.__prevPointerEvents;
          });
        }, 450);
      }, { capture: true, passive: true });
    })();
    </script>
